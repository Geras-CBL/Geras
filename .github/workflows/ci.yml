name: CI Checks and Deploy

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./geras
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: ./geras/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Expo Lint
        run: npm run lint

      - name: Check Prettier Formatting
        run: npm run check-format

  build_android:
    if: github.ref == 'refs/heads/main'
    needs: lint-and-format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./geras
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: ./geras/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build Android
        id: build_eas
        run: eas build --platform android --non-interactive --profile production --json > build_output.json

      - name: Generate Link Summary
        run: |
          BUILD_URL=$(cat build_output.json | jq -r '.[0].buildUrl')
          echo "### 🚀 Android Build Started" >> $GITHUB_STEP_SUMMARY
          echo "You can view the build progress and download the artifact here:" >> $GITHUB_STEP_SUMMARY
          echo "**[View Build on Expo Dashboard]($BUILD_URL)**" >> $GITHUB_STEP_SUMMARY
